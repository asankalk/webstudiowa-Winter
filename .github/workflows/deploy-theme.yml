name: Deploy Winter Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Deployment notes:
# - This workflow is designed for SSH + rsync deployment, not FTP/FTPS.
# - All credentials and connection details must be provided through GitHub Secrets.
# - Store the confirmed live theme path in LIVE_THEME_PATH rather than hardcoding it here.
# - Do not commit server passwords, SSH private keys, or other secrets to the repository.
# - The rsync --delete flag can remove files on the live server that no longer exist in Git.
# - Back up the live theme directory before the first automated deployment.

jobs:
  build:
    name: Build Theme
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build compiled assets
        run: npm run build

      - name: Validate required theme files
        run: |
          test -f style.css
          test -f functions.php
          test -f package.json
          test -d assets
          test -d inc
          test -d template-parts

  deploy:
    name: Deploy To Live Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build compiled assets
        run: npm run build

      - name: Validate deployment path secret
        run: test -n "${{ secrets.LIVE_THEME_PATH }}"

      - name: Confirm deployment secrets are configured
        run: |
          test -n "${{ secrets.LIVE_HOST }}"
          test -n "${{ secrets.LIVE_PORT }}"
          test -n "${{ secrets.LIVE_USER }}"
          test -n "${{ secrets.LIVE_SSH_KEY }}"
          test -n "${{ secrets.LIVE_THEME_PATH }}"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIVE_SSH_KEY }}

      - name: Add server host key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${{ secrets.LIVE_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.LIVE_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${{ secrets.LIVE_PORT }}" -H "${{ secrets.LIVE_HOST }}" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy theme via rsync over SSH
        shell: bash
        env:
          LIVE_HOST: ${{ secrets.LIVE_HOST }}
          LIVE_PORT: ${{ secrets.LIVE_PORT }}
          LIVE_USER: ${{ secrets.LIVE_USER }}
          LIVE_THEME_PATH: ${{ secrets.LIVE_THEME_PATH }}
        run: |
          # Uses SSH + rsync with --delete, so confirm the backup is done and the
          # LIVE_THEME_PATH secret points to the exact live winter theme directory.
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='backups/' \
            --exclude='backup/' \
            --exclude='*.sql' \
            --exclude='*.zip' \
            --exclude='*.tar' \
            --exclude='*.tar.gz' \
            --exclude='*.tgz' \
            --exclude='README.md' \
            --exclude='docs/' \
            --exclude='package-lock.json' \
            --exclude='package.json' \
            --exclude='assets/scss/' \
            -e "ssh -p ${LIVE_PORT}" \
            ./ "${LIVE_USER}@${LIVE_HOST}:${LIVE_THEME_PATH}"
